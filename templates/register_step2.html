{% extends "base.html" %}
{% block content %}
<div class="logo-container">
    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
    <div class="logo-title">Gerenciador de Tarefas</div>
    <div class="logo-subtitle">Crie sua conta gratuita</div>
</div>

<div class="steps-container">
    <div class="step completed">
        <div class="step-circle"><i class="fas fa-check"></i></div>
        <div class="step-label">Conta</div>
    </div>
    <div class="step-line active"></div>
    <div class="step active">
        <div class="step-circle">2</div>
        <div class="step-label">Perfil</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">Endereço</div>
    </div>
</div>

<div class="form-container">
    <div class="form-header">
        <h2>Seu Perfil</h2>
        <p>Preencha com seus dados pessoais</p>
    </div>

    <form method="POST" action="{{ url_for('register_step2') }}">
        <div class="form-group">
            <label class="form-label">Nome Completo *</label>
            <div class="input-with-icon">
                <i class="fas fa-user input-icon-left"></i>
                <input type="text" name="name" class="form-control" placeholder="Seu nome" required>
            </div>
        </div>

        <div class="form-group row">
            <div>
                <label class="form-label">Telefone</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone input-icon-left"></i>
                    <input type="text" name="phone" id="phone" class="form-control" placeholder="(00) 00000-0000"
                        maxlength="15">
                </div>
            </div>

            <div>
                <label class="form-label">Sexo</label>
                <select name="gender" class="form-control">
                    <option value="">Selecione</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                    <option value="O">Outro</option>
                </select>
            </div>
        </div>

        <div class="form-actions mt-4">
            <a href="{{ url_for('register_step1') }}" class="btn btn-outline"
                style="text-align: center; text-decoration: none;"><i class="fas fa-arrow-left"></i> Voltar</a>
            <button type="submit" class="btn btn-primary">Continuar <i class="fas fa-arrow-right"></i></button>
        </div>
    </form>
</div>

<script>
    document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });
</script>
{% endblock %}
