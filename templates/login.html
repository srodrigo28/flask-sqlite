{% extends "base.html" %}
{% block content %}
<div class="logo-container">
    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
    <div class="logo-title">Gerenciador de Tarefas</div>
    <div class="logo-subtitle">Acesso ao sistema</div>
</div>

<div class="form-container">
    <div class="form-header">
        <h2>Entrar</h2>
        <p>Informe seus dados para acessar</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label">E-mail</label>
            <div class="input-with-icon">
                <i class="fas fa-envelope input-icon-left"></i>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="input-with-icon">
                <i class="fas fa-lock input-icon-left"></i>
                <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
                <i class="fas fa-eye input-icon-right"
                    onclick="const input = this.previousElementSibling; if(input.type === 'password'){input.type = 'text'; this.classList.replace('fa-eye', 'fa-eye-slash');}else{input.type = 'password'; this.classList.replace('fa-eye-slash', 'fa-eye');}"></i>
            </div>
        </div>

        <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary">Entrar <i class="fas fa-arrow-right"></i></button>
        </div>
    </form>
</div>

<div class="bottom-links">
    Não tem uma conta? <a href="{{ url_for('register_step1') }}">Criar agora</a>
</div>
{% endblock %}
