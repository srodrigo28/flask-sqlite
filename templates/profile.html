{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>Atualizar Perfil</h2>
        <p>Edite suas informações pessoais e endereço</p>
    </div>

    <form method="POST" action="{{ url_for('profile') }}">
        <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <div class="input-with-icon">
                <i class="fas fa-user input-icon-left"></i>
                <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
            </div>
        </div>

        <div class="form-group row">
            <div>
                <label class="form-label">Telefone</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone input-icon-left"></i>
                    <input type="text" name="phone" id="phone" class="form-control" value="{{ current_user.phone }}">
                </div>
            </div>

            <div>
                <label class="form-label">Sexo</label>
                <select name="gender" class="form-control">
                    <option value="" {% if not current_user.gender %}selected{% endif %}>Selecione</option>
                    <option value="M" {% if current_user.gender=='M' %}selected{% endif %}>Masculino</option>
                    <option value="F" {% if current_user.gender=='F' %}selected{% endif %}>Feminino</option>
                    <option value="O" {% if current_user.gender=='O' %}selected{% endif %}>Outro</option>
                </select>
            </div>
        </div>

        <h3 style="margin-top: 30px; margin-bottom: 15px; font-size: 16px;">Endereço</h3>

        <div class="form-group">
            <label class="form-label">CEP</label>
            <div class="input-with-action input-with-icon">
                <i class="fas fa-map-marker-alt input-icon-left"></i>
                <input type="text" name="cep" id="cep" class="form-control" value="{{ current_user.cep }}">
                <button type="button" class="btn-search" onclick="buscarCep()">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
        </div>

        <div class="form-group row">
            <div style="flex: 2;">
                <label class="form-label">Rua / Logradouro</label>
                <input type="text" name="street" id="street" class="form-control" value="{{ current_user.street }}">
            </div>

            <div style="flex: 1;">
                <label class="form-label">Número</label>
                <input type="text" name="number" class="form-control" value="{{ current_user.number }}">
            </div>
        </div>

        <div class="form-group row">
            <div>
                <label class="form-label">Complemento</label>
                <input type="text" name="complement" class="form-control" value="{{ current_user.complement }}">
            </div>

            <div>
                <label class="form-label">Bairro</label>
                <input type="text" name="neighborhood" id="neighborhood" class="form-control"
                    value="{{ current_user.neighborhood }}">
            </div>
        </div>

        <div class="form-group row">
            <div style="flex: 2;">
                <label class="form-label">Cidade</label>
                <input type="text" name="city" id="city" class="form-control" value="{{ current_user.city }}">
            </div>

            <div style="flex: 1;">
                <label class="form-label">Estado</label>
                <input type="text" name="state" id="state" class="form-control" value="{{ current_user.state }}">
            </div>
        </div>

        <div class="form-actions mt-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline"
                style="text-align: center; text-decoration: none;"><i class="fas fa-arrow-left"></i> Voltar</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('cep').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
    });

    function buscarCep() {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');
        if (cep.length === 8) {
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('street').value = data.logradouro;
                        document.getElementById('neighborhood').value = data.bairro;
                        document.getElementById('city').value = data.localidade;
                        document.getElementById('state').value = data.uf;
                    } else {
                        alert("CEP não encontrado.");
                    }
                })
                .catch(() => alert("Erro ao buscar CEP."));
        }
    }
</script>
{% endblock %}
