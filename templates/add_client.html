{% extends "base.html" %}
{% block content %}
<div class="form-container" style="max-width: 600px; margin: 0 auto; width: 100%;">
    <div class="form-header">
        <h2>Novo Cliente</h2>
        <p>Informe os dados para registro da empresa ou pessoa</p>
    </div>

    <form method="POST" action="{{ url_for('add_client') }}">
        <div class="form-group row">
            <div style="flex: 2;">
                <label class="form-label">Nome / Razão Social *</label>
                <div class="input-with-icon">
                    <i class="fas fa-building input-icon-left"></i>
                    <input type="text" name="name" class="form-control" placeholder="Nome do cliente" required>
                </div>
            </div>
            <div style="flex: 1;">
                <label class="form-label">Tipo *</label>
                <select name="client_type" class="form-control" required>
                    <option value="" selected disabled>Selecione</option>
                    <option value="Empresa">Empresa Jurídica</option>
                    <option value="Pessoa">Pessoa Física</option>
                </select>
            </div>
        </div>

        <div class="form-group row">
            <div style="flex: 1;">
                <label class="form-label">Telefone de Contato</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone input-icon-left"></i>
                    <input type="text" name="phone" id="phone" class="form-control" placeholder="(00) 00000-0000">
                </div>
            </div>
            <div style="flex: 1;">
                <label class="form-label">Tipo de Atendimento *</label>
                <select name="service_type" class="form-control" required>
                    <option value="" selected disabled>Selecione</option>
                    <option value="Contrato">Contrato Recorrente</option>
                    <option value="Atendimento Único">Atendimento Único</option>
                </select>
            </div>
        </div>

        <!-- Endereço Section -->
        <h3
            style="margin-top: 30px; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
            Endereço de Atendimento</h3>

        <div id="cep-error" class="error-text" style="display:none; color: var(--danger-red);">Erro ao buscar CEP.</div>

        <div class="form-group">
            <label class="form-label">CEP</label>
            <div class="input-with-action input-with-icon">
                <i class="fas fa-map-marker-alt input-icon-left"></i>
                <input type="text" name="cep" id="cep" class="form-control" placeholder="00000-000" maxlength="9">
                <button type="button" class="btn-search" onclick="buscarCep()">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
        </div>

        <div class="form-group row">
            <div style="flex: 2;">
                <label class="form-label">Rua / Logradouro</label>
                <input type="text" name="street" id="street" class="form-control" placeholder="Avenida Brasil">
            </div>
            <div style="flex: 1;">
                <label class="form-label">Número</label>
                <input type="text" name="number" class="form-control" placeholder="Nº">
            </div>
        </div>

        <div class="form-group row">
            <div>
                <label class="form-label">Complemento</label>
                <input type="text" name="complement" class="form-control" placeholder="Sala 3B...">
            </div>
            <div>
                <label class="form-label">Bairro</label>
                <input type="text" name="neighborhood" id="neighborhood" class="form-control" placeholder="Bairro">
            </div>
        </div>

        <div class="form-group row">
            <div style="flex: 2;">
                <label class="form-label">Cidade</label>
                <input type="text" name="city" id="city" class="form-control" placeholder="Cidade">
            </div>
            <div style="flex: 1;">
                <label class="form-label">Estado</label>
                <input type="text" name="state" id="state" class="form-control" placeholder="UF" maxlength="2">
            </div>
        </div>

        <div class="form-actions mt-4">
            <a href="{{ url_for('clients') }}" class="btn btn-outline"
                style="text-align: center; text-decoration: none;"><i class="fas fa-times"></i> Cancelar</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Cadastrar Cliente</button>
        </div>
    </form>
</div>

<script>
    // Mascara de telefone
    document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // Auto Busca CEP
    document.getElementById('cep').addEventListener('input', function (e) {
        let rawValue = e.target.value.replace(/\D/g, '');
        let x = rawValue.match(/(\d{0,5})(\d{0,3})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];

        if (rawValue.length === 8) {
            buscarCep();
        }
    });

    // Request ViaCEP API
    function buscarCep() {
        const errorDiv = document.getElementById('cep-error');
        const cep = document.getElementById('cep').value.replace(/\D/g, '');

        if (cep.length === 8) {
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('street').value = data.logradouro;
                        document.getElementById('neighborhood').value = data.bairro;
                        document.getElementById('city').value = data.localidade;
                        document.getElementById('state').value = data.uf;
                        errorDiv.style.display = 'none';
                    } else {
                        errorDiv.style.display = 'block';
                    }
                })
                .catch(() => {
                    errorDiv.style.display = 'block';
                });
        }
    }
</script>
{% endblock %}
